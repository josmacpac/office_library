<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiblioHub - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body style="background-color: #f4f7f9; display: block;"> 
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background-color: var(--primary-blue);">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">BiblioHub</a>
        
        <div class="d-flex align-items-center">
            <a href="admin.html" class="btn btn-light btn-sm me-3">
                <i class="bi bi-book me-1"></i> Ver Inventario
            </a>

            <span class="text-white me-3 d-none d-md-inline" id="userNameDisplay">Cargando...</span>
            
            <button class="btn btn-outline-danger btn-sm" onclick="cerrarSesion()">
                <i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión
            </button>
        </div>
    </div>
</nav>

    <div class="container py-5">
        
        <section class="mb-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-primary"><i class="bi bi-search"></i> Explorar Biblioteca</h3>
            </div>
            
            <div class="card border-0 shadow-sm p-4 mb-4" style="border-radius: 15px;">
                <div class="row g-3">
                    <div class="col-md-9">
                        <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="Buscar por título, autor o categoría...">
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-primary w-100 h-100 fw-bold" id="btnSearch">Buscar</button>
                    </div>
                </div>
            </div>

            <div class="row row-cols-1 row-cols-md-3 g-4" id="booksGrid">
                <div class="col-12 text-center mt-5 text-muted">
        <p>Utiliza el buscador para encontrar un libro por título o autor.</p>
    </div>
                <div class="col">
                    
                </div>
            </div>
        </section>

        <hr class="my-5 text-muted opacity-25">

        <section>
            <h3 class="fw-bold text-primary mb-4"><i class="bi bi-journal-check"></i> Mis Préstamos Actuales</h3>
            
            <div class="card border-0 shadow-sm overflow-hidden" style="border-radius: 15px;">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th class="ps-4">Título del Libro</th>
                                <th>Fecha de Préstamo</th>
                                <th>Fecha Límite</th>
                                <th>Estado</th>
                                <th class="text-center">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="loansTableBody">
                            
                        </tbody>
                    </table>
                </div>
                <div id="noLoansMessage" class="text-center p-5 d-none">
                    <i class="bi bi-book text-muted" style="font-size: 3rem;"></i>
                    <p class="mt-2 text-muted">No tienes libros prestados en este momento.</p>
                </div>
            </div>
        </section>
    </div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
