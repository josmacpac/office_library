<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiblioHub - Inventario General</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-blue: #003366; }
        .table-danger-light { background-color: #fceaea !important; }
        .badge { font-weight: 600; padding: 0.5em 0.8em; }
    </style>
</head>
<body style="background-color: #f4f7f9; display: block;"> 
    
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background-color: var(--primary-blue);">
        <div class="container">
            <a class="navbar-brand fw-bold" href="dashboard.html">BiblioHub</a>
            <div class="d-flex align-items-center">
                <span class="text-white me-3 d-none d-md-inline" id="userNameDisplay">Cargando...</span>
                <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">
                    <i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="row mb-4">
            <div class="col-12">
                <h3 class="fw-bold text-dark">Control de Inventario</h3>
                <p class="text-muted">Estado actual de todos los ejemplares y seguimiento de préstamos.</p>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                <h5 class="mb-0 fw-bold">Listado de Libros</h5>
                <span class="badge bg-primary" id="totalLibros">-- libros</span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">Libro</th>
                                <th>Estado</th>
                                <th>Poseedor Actual</th>
                                <th>Tiempo / Vencimiento</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTableBody">
                            <tr>
                                <td colspan="4" class="text-center py-5">
                                    <div class="spinner-border text-primary" role="status"></div>
                                    <p class="mt-2 text-muted">Consultando base de datos...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/admin.js"></script>

    <script>
        // Si creaste un archivo separado, este código va en tu JS.
        // Si no, puedes dejarlo aquí para probarlo rápido.
        document.addEventListener('DOMContentLoaded', async () => {
            // Asegurarnos que la sesión sea válida
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }
            
            if(document.getElementById('userNameDisplay')) {
                document.getElementById('userNameDisplay').textContent = 
                    `Admin: ${session.user.user_metadata.full_name || 'Colaborador'}`;
            }

            cargarInventarioGeneral();
        });
    </script>
</body>
</html>
